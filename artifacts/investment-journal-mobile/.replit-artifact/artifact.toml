kind = "mobile"
previewPath = "/mobile"
title = "Investment Journal Mobile"
version = "1.0.0"
id = "artifacts/investment-journal-mobile"
router = "path"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile" ]
localPort = 8081

[services.development]
run = "pnpm --filter @workspace/investment-journal-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/investment-journal-mobile", "run", "build" ]
run = "pnpm --filter @workspace/investment-journal-mobile run serve"

[services.env]
PORT = "8081"
